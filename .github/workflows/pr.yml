name: Pull Request
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read # for checkout

jobs:
  verify:
    name: Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      # The CLI build compiles a standalone binary with `bun build
      # --compile`, and the desktop build copies that binary in via
      # copy-cli.mjs — so the PR build needs Bun on PATH just like
      # release-cli-binaries.yml does.
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # The TypeScript half of the `pnpm verify` green bar. The Rust half
      # runs on macOS in verify-rust below, where packages/vm is developed
      # and the Virtualization.framework backend compiles.
      - name: Build
        run: pnpm run build
      - name: Typecheck
        run: pnpm exec nx run-many --target=typecheck --all
      - name: Check linting and code style
        run: pnpm run lint:check
      - name: Test
        run: pnpm exec nx run-many --target=test --all

  verify-rust:
    name: Verify (Rust microVM crate)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/vm
      - name: cargo build / test / clippy
        working-directory: packages/vm
        run: |
          cargo build
          cargo test
          cargo clippy -- -D warnings
