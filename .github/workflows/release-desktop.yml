name: Release desktop app
on:
  # Dispatched by .github/workflows/release.yml right after nx-release
  # tags a new version (alongside the api-server image + CLI binary
  # builds). Also runnable on its own via the Actions UI for hot-fix
  # re-uploads of the desktop bundles.
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag the bundles attach to (e.g. v1.48.0). Defaults to the desktop package.json version with a leading "v".
        required: false
        default: ''
      unsigned:
        description: Build UNSIGNED, un-notarized macOS bundles (skips the Developer ID keychain import + notarization). Updater .sig generation via TAURI_SIGNING_PRIVATE_KEY is unaffected.
        type: boolean
        required: false
        default: false

permissions:
  contents: write # to upload DMGs + the updater manifest to the release

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------
  # Per-arch macOS bundle build. The matrix mirrors the CLI's per-arch
  # compile targets (packages/cli/package.json -> compile:darwin-*):
  # aarch64 (Apple Silicon) and x86_64 (Intel). Each runs on a native
  # runner so the embedded Bun-compiled `appliance` sidecar matches the
  # bundle's arch — Tauri can't cross-compile the Rust shell the way Bun
  # cross-compiles the CLI.
  # ----------------------------------------------------------------------
  build:
    name: Build ${{ matrix.arch }} bundle
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            rust_target: aarch64-apple-darwin
            # Apple-Silicon runner.
            runs_on: macos-14
          - arch: x86_64
            rust_target: x86_64-apple-darwin
            # Intel runner. macos-13 was retired by GitHub (jobs never
            # schedule and time out after 24h); macos-15-intel is the
            # supported native-Intel image, so the Bun sidecar arch
            # still matches the bundle without cross-compiling.
            runs_on: macos-15-intel
    runs-on: ${{ matrix.runs_on }}
    # The Developer ID cert (APPLE_CERTIFICATE + password), the notarization
    # creds (APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID/APPLE_SIGNING_IDENTITY) and
    # the Tauri updater keys (TAURI_SIGNING_PRIVATE_KEY, TAURI_UPDATER_PUBKEY)
    # are scoped to the `publish` GitHub environment. A job only sees
    # environment-scoped secrets when it opts in here; without this the
    # secrets.* refs below resolve to empty strings and the bundle ships
    # UNSIGNED + un-notarized with a placeholder updater key.
    environment: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the SDK postbuild can `git describe` a tag.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the desktop's compile-time workspace deps from the nx
      # dependency graph: the CLI (bundled as the sidecar binary) and the
      # @appliance.sh/app React frontend (the Tauri frontendDist), plus
      # their transitive deps (sdk → infra → bootstrap → helper), all in
      # topological order. nx derives the order from the graph — no
      # hand-maintained list shared with release-cli-binaries.yml to drift.
      - name: Build desktop prerequisites
        run: pnpm exec nx run-many -t build -p @appliance.sh/cli @appliance.sh/app

      # nx-release bumps the package.json versions but does NOT touch the
      # Rust-side version sources (tauri.conf.json, Cargo.toml). The
      # updater compares the RUNNING app's version (from tauri.conf.json)
      # against the feed, so they must match the released package version
      # or every client thinks it's perpetually behind/ahead. Sync them
      # here from the single source of truth.
      - name: Sync bundle version from package.json
        run: node packages/desktop/scripts/sync-version.mjs

      # The committed tauri.conf.json carries a placeholder updater
      # pubkey (fail-safe: update checks reject everything). Release
      # builds inject the real public key so self-update actually works.
      - name: Inject updater public key
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: node packages/desktop/scripts/set-updater-pubkey.mjs

      # Build, Developer-ID-sign (hardened runtime), notarize + staple,
      # and emit signed updater artifacts. Every secret below is OPTIONAL
      # at the script level: tauri.release.conf.json's
      # createUpdaterArtifacts only signs when TAURI_SIGNING_PRIVATE_KEY
      # is set, and notarize-macos.mjs no-ops without the APPLE_* creds —
      # so a fork without secrets still gets unsigned bundles instead of
      # a hard failure. See packages/desktop/README.md -> Auto-update.
      - name: Build + sign + notarize bundle
        id: bundle
        working-directory: packages/desktop
        env:
          # --- Developer ID cert import (into a temp keychain, below) ---
          # Base64-encoded .p12 of the "Developer ID Application" cert +
          # private key, and its export password.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # --- Developer ID signing + notarization (notarize-macos.mjs) ---
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # --- updater artifact signing (Tauri) ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # workflow_dispatch escape hatch: force an unsigned build even
          # when the APPLE_* secrets exist (e.g. cert expired mid-release).
          UNSIGNED: ${{ inputs.unsigned }}
        run: |
          set -euo pipefail
          if [ "${UNSIGNED:-false}" = "true" ]; then
            echo "unsigned=true — masking APPLE_* creds; keychain import and notarization will be skipped."
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_TEAM_ID APPLE_ID APPLE_PASSWORD
          fi
          # Import the Developer ID cert into a temporary keychain when the
          # secret is present; codesign can't see a cert that isn't in a
          # keychain. Skipped (with the rest of signing) when absent.
          if [ -n "${APPLE_CERTIFICATE:-}" ]; then
            KEYCHAIN_PATH="$RUNNER_TEMP/appliance-signing.keychain-db"
            security create-keychain -p "" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "" "$KEYCHAIN_PATH"
            echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
            security import "$RUNNER_TEMP/cert.p12" -P "${APPLE_CERTIFICATE_PASSWORD:-}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain
            security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH" >/dev/null
          else
            echo "APPLE_CERTIFICATE not set — building an UNSIGNED, un-notarized bundle (expected for forks / dry runs)."
          fi
          pnpm run tauri:build:release
          # Record what signing this build actually attempted, so the guard
          # step can hard-fail if the expected artifacts don't materialize.
          # apple_signing reflects the post-UNSIGNED-mask state; updater
          # signing is independent (UNSIGNED does not touch the Tauri key).
          if [ -n "${APPLE_CERTIFICATE:-}" ]; then
            echo "apple_signing=expected" >> "$GITHUB_OUTPUT"
          else
            echo "apple_signing=skipped" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "updater_signing=expected" >> "$GITHUB_OUTPUT"
          else
            echo "updater_signing=skipped" >> "$GITHUB_OUTPUT"
          fi

      # Fail LOUD when signing was configured but the outputs aren't actually
      # signed / notarized / updater-signed. A silent no-op (partial creds, a
      # Tauri version that stopped invoking notarize-macos, an expired cert
      # that imported but can't sign) would otherwise ship a bundle Gatekeeper
      # blocks or the updater can't verify. Forks with no secrets skip every
      # assertion (both signals are 'skipped'), preserving unsigned dry runs.
      - name: Guard — signing + notarization actually happened
        if: steps.bundle.outputs.apple_signing == 'expected' || steps.bundle.outputs.updater_signing == 'expected'
        working-directory: packages/desktop/src-tauri/target/release/bundle
        env:
          APPLE_SIGNING: ${{ steps.bundle.outputs.apple_signing }}
          UPDATER_SIGNING: ${{ steps.bundle.outputs.updater_signing }}
        run: |
          set -euo pipefail
          fail=0

          if [ "$APPLE_SIGNING" = "expected" ]; then
            APP=$(find macos -maxdepth 1 -name '*.app' | head -n1 || true)
            if [ -z "$APP" ]; then
              echo "::error::signing was configured but no .app was produced under macos/ — did tauri:build:release run?" >&2
              fail=1
            else
              # The whole bundle (shell + embedded sidecars) must verify as a
              # validly sealed Developer-ID signature, not an ad-hoc "-" one.
              if ! codesign --verify --deep --strict --verbose=2 "$APP"; then
                echo "::error::$APP failed codesign --verify --deep --strict." >&2
                fail=1
              fi
              if ! codesign -dvv "$APP" 2>&1 | grep -q 'Authority=Developer ID Application'; then
                echo "::error::$APP is not Developer-ID signed (ad-hoc / dev signatures fail Gatekeeper)." >&2
                codesign -dvv "$APP" 2>&1 | grep -E 'Authority=|Signature' >&2 || true
                fail=1
              fi
              # Stapled ticket = notarization succeeded AND is verifiable
              # offline. This transitively proves the hardened runtime, since
              # Apple won't notarize a bundle without it.
              if ! xcrun stapler validate "$APP"; then
                echo "::error::$APP has no stapled notarization ticket." >&2
                fail=1
              fi
              DMG=$(find dmg -maxdepth 1 -name '*.dmg' | head -n1 || true)
              if [ -n "$DMG" ] && ! xcrun stapler validate "$DMG"; then
                echo "::error::$DMG has no stapled notarization ticket." >&2
                fail=1
              fi
            fi
          fi

          if [ "$UPDATER_SIGNING" = "expected" ]; then
            SIG=$(find macos -maxdepth 1 -name '*.app.tar.gz.sig' | head -n1 || true)
            if [ -z "$SIG" ]; then
              echo "::error::TAURI_SIGNING_PRIVATE_KEY was set but no *.app.tar.gz.sig was produced — self-update would be unverifiable." >&2
              find macos -maxdepth 1 -type f >&2 || true
              fail=1
            fi
          fi

          [ "$fail" -eq 0 ] && echo "Signing guard passed — expected artifacts are present and valid."
          exit "$fail"

      - name: Stage release assets
        id: stage
        working-directory: packages/desktop/src-tauri/target/release/bundle
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/release-assets"
          mkdir -p "$OUT"
          # DMG: rename to an arch-tagged, stable asset name so the
          # release page is unambiguous and the updater manifest can
          # point at a predictable URL.
          DMG=$(find dmg -name '*.dmg' | head -n1 || true)
          if [ -n "$DMG" ]; then
            cp "$DMG" "$OUT/Appliance_${ARCH}.dmg"
          fi
          # Updater artifacts: Tauri emits a tarball + its detached .sig
          # next to the .app. These are what the updater downloads +
          # verifies. Absent when TAURI_SIGNING_PRIVATE_KEY wasn't set.
          TARBALL=$(find macos -name '*.app.tar.gz' | head -n1 || true)
          if [ -n "$TARBALL" ]; then
            cp "$TARBALL" "$OUT/Appliance_${ARCH}.app.tar.gz"
            cp "$TARBALL.sig" "$OUT/Appliance_${ARCH}.app.tar.gz.sig"
          fi
          # Checksums for the DMG so users can verify a manual download.
          ( cd "$OUT" && shasum -a 256 ./* > "checksums-${ARCH}.txt" )
          echo "out=$OUT" >> "$GITHUB_OUTPUT"
          ls -la "$OUT"

      - name: Upload per-arch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.arch }}
          path: ${{ steps.stage.outputs.out }}
          if-no-files-found: warn

  # ----------------------------------------------------------------------
  # Windows x86_64 bundle. Produces the NSIS installer (the artifact a
  # non-technical user downloads and double-clicks) plus its updater
  # signature. The WSL2 microVM backend (packages/vm/src/backend/wsl.rs)
  # is compiled and bundled by the same vm:build/vm:bundle scripts the
  # macOS job runs — they are platform-aware.
  # ----------------------------------------------------------------------
  build-windows:
    name: Build windows-x86_64 bundle
    runs-on: windows-latest
    # Opt in to the `publish` environment for the Tauri updater secrets
    # (TAURI_SIGNING_PRIVATE_KEY + TAURI_UPDATER_PUBKEY). Without it the
    # NSIS installer's updater archive ships unsigned and the injected
    # pubkey stays the fail-safe placeholder, so self-update breaks. (No
    # Apple creds are used here — Authenticode signing is still TODO.)
    environment: publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/desktop/src-tauri
            packages/vm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop prerequisites
        run: pnpm exec nx run-many -t build -p @appliance.sh/cli @appliance.sh/app

      - name: Sync bundle version from package.json
        run: node packages/desktop/scripts/sync-version.mjs

      - name: Inject updater public key
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: node packages/desktop/scripts/set-updater-pubkey.mjs

      # No Apple secrets here — notarize-macos.mjs skips itself off-darwin.
      # Windows Authenticode signing is not configured yet; the installer
      # ships unsigned (SmartScreen shows a "more info" step) until a
      # WINDOWS_CERTIFICATE secret + signtool step is added.
      - name: Build bundle
        id: bundle
        working-directory: packages/desktop
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          pnpm run tauri:build:release
          # Record whether updater signing was configured, so the guard below
          # can hard-fail a real release whose installer came out unsigned.
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "updater_signing=expected" >> "$GITHUB_OUTPUT"
          else
            echo "updater_signing=skipped" >> "$GITHUB_OUTPUT"
          fi

      # Fail LOUD when updater signing was configured but produced no .sig —
      # the Windows installer IS the updater artifact, so an unsigned one
      # breaks self-update. Forks without the Tauri key skip this assertion.
      - name: Guard — updater signature exists
        if: steps.bundle.outputs.updater_signing == 'expected'
        working-directory: packages/desktop/src-tauri/target/release/bundle
        shell: bash
        run: |
          set -euo pipefail
          SIG=$(find nsis -maxdepth 1 -name '*-setup.exe.sig' | head -n1 || true)
          if [ -z "$SIG" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY was set but no *-setup.exe.sig was produced — Windows self-update would be unverifiable." >&2
            find nsis -maxdepth 1 -type f >&2 || true
            exit 1
          fi
          echo "Updater signature present: $SIG"

      - name: Stage release assets
        id: stage
        working-directory: packages/desktop/src-tauri/target/release/bundle
        shell: bash
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/release-assets"
          mkdir -p "$OUT"
          # NSIS installer: the download for humans AND the updater
          # artifact (Tauri v2 updates in place from the -setup.exe).
          SETUP=$(find nsis -name '*-setup.exe' | head -n1 || true)
          if [ -n "$SETUP" ]; then
            cp "$SETUP" "$OUT/Appliance_x86_64-setup.exe"
            if [ -f "$SETUP.sig" ]; then
              cp "$SETUP.sig" "$OUT/Appliance_x86_64-setup.exe.sig"
            fi
          fi
          ( cd "$OUT" && sha256sum ./* > "checksums-windows-x86_64.txt" )
          echo "out=$OUT" >> "$GITHUB_OUTPUT"
          ls -la "$OUT"

      - name: Upload per-arch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x86_64
          path: ${{ steps.stage.outputs.out }}
          if-no-files-found: warn

  # ----------------------------------------------------------------------
  # Collect every platform, build the single `latest.json` updater
  # manifest that points at each platform's signed artifact, and publish
  # everything to the GitHub Release for the tag.
  # ----------------------------------------------------------------------
  publish:
    name: Publish bundles + updater manifest
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all arch artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Resolve release tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            TAG="${INPUT_TAG}"
          else
            VERSION=$(node -p "require('./packages/desktop/package.json').version")
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Releasing desktop bundles for ${TAG}"

      # Assemble latest.json from the per-arch .sig files. The updater
      # keys platforms as `<os>-<arch>`; macOS aarch64 → darwin-aarch64,
      # x86_64 → darwin-x86_64. The `url` points at the arch tarball on
      # this release; `signature` is the verbatim .sig content.
      - name: Build updater manifest (latest.json)
        id: manifest
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/build-updater-manifest.mjs

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists."
          else
            echo "Creating release ${TAG}."
            gh release create "${TAG}" --title "${TAG}" --generate-notes
          fi

      - name: Upload bundles + manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          # Flatten the downloaded artifacts and upload every DMG, tarball,
          # .sig, checksum file, plus the assembled latest.json. --clobber
          # so a re-run updates the release in place.
          ASSETS=$(find dist-artifacts -type f)
          # latest.json must be present for the updater endpoint to resolve.
          gh release upload "${TAG}" --clobber latest.json $ASSETS
