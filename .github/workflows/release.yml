name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: read # for checkout

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance and trusted publishing
      actions: write # to dispatch the api-server image build workflow on a fresh release
    outputs:
      publish_required: ${{ steps.semantic_release.outputs.publish_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org
          scope: '@appliance.sh'
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check linting and code style
        run: pnpm run lint:check
      - name: Release
        id: nx_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_ACCESS: public
        run: |
          git config --global user.email "eliot.lim@gmail.com"
          git config --global user.name "Eliot Lim"
          pnpm run release:ci

      - name: Dispatch downstream release artifact builds
        # `nx release` writes a `chore(release): publish X.Y.Z` commit
        # to HEAD only when a version bump actually happened. Tags it
        # pushes with GITHUB_TOKEN can't fire the `tags: v*` trigger
        # on the artifact workflows (that's a deliberate GitHub safety
        # against workflow recursion), so we kick them manually via
        # workflow_dispatch — which GITHUB_TOKEN *is* allowed to
        # invoke. Skip the dispatch when no release was cut so we
        # don't push duplicate image tags or re-upload assets on
        # no-op runs.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          msg=$(git log -1 --pretty=%s)
          if echo "$msg" | grep -qE '^chore\(release\): publish'; then
            VERSION=$(node -p "require('./packages/api-server/package.json').version")
            echo "Dispatching api-server image build for v${VERSION}"
            gh workflow run release-api-server-image.yml --ref main -f tag="${VERSION}"
            CLI_VERSION=$(node -p "require('./packages/cli/package.json').version")
            echo "Dispatching CLI binaries build for v${CLI_VERSION}"
            gh workflow run release-cli-binaries.yml --ref main -f tag="v${CLI_VERSION}"
            DESKTOP_VERSION=$(node -p "require('./packages/desktop/package.json').version")
            echo "Dispatching desktop bundle build for v${DESKTOP_VERSION}"
            gh workflow run release-desktop.yml --ref main -f tag="v${DESKTOP_VERSION}"
          else
            echo "HEAD ('${msg}') is not a release commit; skipping artifact dispatches."
          fi
