name: Release api-server image
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to push (defaults to package version)
        required: false
        default: ''

permissions:
  contents: read
  packages: write # push to ghcr.io/<owner>/api-server

concurrency:
  group: release-api-server-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build + push api-server image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage docker-deps
        working-directory: packages/api-server
        run: ./scripts/docker-prep.sh

      - name: Derive image tags
        id: tags
        env:
          PKG_VERSION: ${{ hashFiles('packages/api-server/package.json') }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Resolve version from packages/api-server/package.json so
          # tags always track the same source of truth the SDK uses.
          VERSION=$(node -p "require('./packages/api-server/package.json').version")
          # Choose the primary tag:
          #   - workflow_dispatch + input.tag  → use input.tag
          #   - push tag starting with `v`     → strip leading `v`
          #   - otherwise                      → package.json version
          if [ -n "${INPUT_TAG:-}" ]; then
            PRIMARY="${INPUT_TAG}"
          elif [ "${GITHUB_EVENT_NAME:-}" = "push" ] && [ -n "${REF_NAME:-}" ] && [[ "${REF_NAME}" == v* ]]; then
            PRIMARY="${REF_NAME#v}"
          else
            PRIMARY="${VERSION}"
          fi
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-12)
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LOWER}/api-server"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${PRIMARY}"
            echo "${IMAGE}:sha-${SHORT_SHA}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: packages/api-server
          file: packages/api-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
