name: Release api-server image
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to push (defaults to package version)
        required: false
        default: ''

permissions:
  contents: read
  packages: write # push to ghcr.io/<owner>/api-server

concurrency:
  group: release-api-server-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Per-platform native build. Each matrix shard runs on a runner of
  # the matching architecture and pushes a digest-only image. The
  # multi-arch manifest is assembled in the merge job below — that's
  # the docker/buildx-recommended pattern for matrix builds and lets
  # us drop the QEMU emulation that was making linux/arm64 builds
  # take ~10× longer than they needed to.
  build:
    name: Build ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: true
      matrix:
        platform:
          # Renamed from { docker, runs-on, slug } to plain identifiers
          # — `runs-on` (with dash) and `docker` (potential GHA-context
          # keyword) were suspected of confusing the expression parser
          # such that `matrix.platform.docker` resolved to amd64 on
          # the arm64 shard.
          - target: linux/amd64
            runner: ubuntu-latest
            slug: amd64
          - target: linux/arm64
            runner: ubuntu-24.04-arm
            slug: arm64
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - name: Diagnostic — runner arch + platform env
        # Confirms the matrix value resolved correctly and surfaces
        # any DOCKER_DEFAULT_PLATFORM override that might steer
        # buildx to a different platform than the matrix asked for.
        # Expect `aarch64` + `linux/arm64` on the arm64 shard, and
        # `x86_64` + `linux/amd64` on the amd64 shard.
        run: |
          echo "matrix.platform.target:  '${{ matrix.platform.target }}'"
          echo "matrix.platform.runner:  '${{ matrix.platform.runner }}'"
          echo "uname -m:                $(uname -m)"
          echo "DOCKER_DEFAULT_PLATFORM: ${DOCKER_DEFAULT_PLATFORM:-(unset)}"

      - name: Unset DOCKER_DEFAULT_PLATFORM
        # If the runner image ships with DOCKER_DEFAULT_PLATFORM set,
        # buildx honours it ahead of `--platform` from build-push-action
        # in some scenarios. Strip it so the matrix's `target` is the
        # only platform input that matters.
        run: echo "DOCKER_DEFAULT_PLATFORM=" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 pulls full history incl. tags. The SDK's
          # postbuild step runs `git describe --tags --abbrev=0` to
          # stamp the built dist with the latest release tag.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage docker-deps
        working-directory: packages/api-server
        run: ./scripts/docker-prep.sh

      - name: Derive image name
        id: image
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LOWER}/api-server" >> "$GITHUB_OUTPUT"

      # Skipping `docker/setup-qemu-action` — on a native-matching
      # runner it's a no-op, and registering binfmt handlers can
      # confuse buildx's default-platform inference. Smallest-change
      # test: remove it and see if TARGETPLATFORM stops resolving to
      # linux/amd64 on the native arm64 shard.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Inspect buildx builder
        # Confirms the buildx daemon's reported platform list. On the
        # arm64 runner we expect linux/arm64 first; if linux/amd64
        # appears as the default platform, that explains TARGETPLATFORM
        # defaulting to amd64 even when --platform is passed.
        run: docker buildx inspect

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: packages/api-server
          file: packages/api-server/Dockerfile
          platforms: ${{ matrix.platform.target }}
          # push-by-digest pushes an unnamed image to the registry and
          # surfaces its digest. The merge job below stitches the
          # platform-specific digests into a tagged multi-arch manifest.
          outputs: type=image,name=${{ steps.image.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
          provenance: true
          sbom: true
          # Per-platform GHA cache scope so amd64 + arm64 don't thrash
          # each other's layer cache. Scope suffix bumped to v2 to
          # invalidate cached layers from earlier QEMU-emulated runs
          # that may have written wrong-arch blobs under the previous
          # scope name.
          cache-from: type=gha,scope=api-server-${{ matrix.platform.slug }}-v2
          cache-to: type=gha,mode=max,scope=api-server-${{ matrix.platform.slug }}-v2

      - name: Export digest
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${RUNNER_TEMP}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform.slug }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Multi-arch manifest assembly. Reads each platform's digest, runs
  # `imagetools create` with the human-readable tags pointing at the
  # combined manifest. Cheap (no build, just registry API calls).
  merge:
    name: Merge multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (package.json only)
        uses: actions/checkout@v4
        with:
          # Sparse checkout — we only need package.json for the version.
          sparse-checkout: |
            packages/api-server/package.json
          sparse-checkout-cone-mode: false

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Resolve version from packages/api-server/package.json so
          # tags always track the same source of truth the SDK uses.
          VERSION=$(node -p "require('./packages/api-server/package.json').version")
          # Choose the primary tag:
          #   - workflow_dispatch + input.tag  → use input.tag
          #   - push tag starting with `v`     → strip leading `v`
          #   - otherwise                      → package.json version
          if [ -n "${INPUT_TAG:-}" ]; then
            PRIMARY="${INPUT_TAG}"
          elif [ "${GITHUB_EVENT_NAME:-}" = "push" ] && [ -n "${REF_NAME:-}" ] && [[ "${REF_NAME}" == v* ]]; then
            PRIMARY="${REF_NAME#v}"
          else
            PRIMARY="${VERSION}"
          fi
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-12)
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LOWER}/api-server"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${PRIMARY}"
            echo "${IMAGE}:sha-${SHORT_SHA}"
            echo "${IMAGE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create manifest
        working-directory: ${{ runner.temp }}/digests
        env:
          # Pass via env so the multi-line tags value (one tag per line)
          # is preserved verbatim. Inlining `${{ steps.tags.outputs.tags }}`
          # directly into the script body splits the value across raw
          # script lines and bash interprets the trailing tags as
          # separate commands.
          IMAGE: ${{ steps.tags.outputs.image }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail
          TAG_ARGS=()
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            TAG_ARGS+=(-t "$tag")
          done <<< "$TAGS"

          SOURCES=()
          for digest in *; do
            SOURCES+=("${IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create "${TAG_ARGS[@]}" "${SOURCES[@]}"

      - name: Inspect resulting manifest
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "::group::${tag}"
            docker buildx imagetools inspect "${tag}"
            echo "::endgroup::"
          done <<< "$TAGS"
