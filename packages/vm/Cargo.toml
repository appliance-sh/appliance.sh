[package]
name = "appliance-vm"
version = "0.1.0"
description = "Appliance microVM manager — one executable, multiple virtualization backends (Virtualization.framework, KVM, WSL2)"
authors = ["Eliot Lim"]
license = "MIT"
edition = "2021"

[[bin]]
name = "appliance-vm"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
libc = "0.2"
ureq = "2"
# SHA-256 for download integrity verification (download_and_verify): the
# unauthenticated k3s/modloop/alpine root-code downloads + the prebuilt
# agent image are hash-pinned in-source and verified before use. ring is
# already in the tree via rustls("ring"); naming it here is zero-cost.
ring = "0.17"
flate2 = "1"
fatfs = "0.3"
tar = "0.4"
fscommon = "0.1"
# Egress TLS interception: per-VM CA + on-the-fly leaf certs (rcgen),
# TLS termination/origination (rustls), upstream trust roots.
rcgen = { version = "0.13", features = ["pem", "x509-parser"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
webpki-roots = "0.26"
# Host-side userspace TCP/IP terminator for the egress-firewall netstack
# (net_link=Netstack): smoltcp consumes the guest's raw Ethernet frames
# off the host socketpair end and terminates guest TCP in-process. Only
# the TCP terminator + L2/IPv4 wire parsing is used — DHCP/DNS are
# answered at the raw-frame layer, so no smoltcp udp/dhcp/dns sockets.
smoltcp = { version = "0.13.1", default-features = false, features = ["std", "medium-ethernet", "proto-ipv4", "socket-tcp"] }

[target.'cfg(windows)'.dependencies]
# Process-liveness probe for pidfiles (OpenProcess/GetExitCodeProcess) —
# the Windows stand-in for `kill(pid, 0)`.
windows-sys = { version = "0.59", features = [
  "Win32_Foundation",
  "Win32_System_Threading",
] }

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = "0.3"
objc2-virtualization = { version = "0.3", features = [
  "block2",
  "dispatch2",
  "VZBootLoader",
  "VZLinuxBootLoader",
  "VZVirtualMachine",
  "VZVirtualMachineConfiguration",
  "VZSerialPortConfiguration",
  "VZSerialPortAttachment",
  "VZFileSerialPortAttachment",
  "VZVirtioConsoleDeviceSerialPortConfiguration",
  "VZNetworkDeviceConfiguration",
  "VZNetworkDeviceAttachment",
  "VZNATNetworkDeviceAttachment",
  # Host-mediated network link (net_link=Netstack): the guest NIC is
  # backed by a socketpair whose host end the smoltcp netstack owns.
  # Pulls in objc2-foundation/NSFileHandle transitively.
  "VZFileHandleNetworkDeviceAttachment",
  "VZMACAddress",
  "VZVirtioNetworkDeviceConfiguration",
  "VZStorageDeviceConfiguration",
  "VZStorageDeviceAttachment",
  "VZDiskImageStorageDeviceAttachment",
  "VZVirtioBlockDeviceConfiguration",
  "VZEntropyDeviceConfiguration",
  "VZVirtioEntropyDeviceConfiguration",
  # VirtioFS host-folder sharing (dev bind-mount).
  "VZDirectoryShare",
  "VZDirectorySharingDevice",
  "VZDirectorySharingDeviceConfiguration",
  "VZSharedDirectory",
  "VZSingleDirectoryShare",
  "VZVirtioFileSystemDeviceConfiguration",
  # virtio-vsock host↔guest channel (dev shell agent).
  "VZSocketDeviceConfiguration",
  "VZSocketDevice",
  "VZVirtioSocketConnection",
  "VZVirtioSocketDevice",
  "VZVirtioSocketDeviceConfiguration",
  "VZVirtioSocketListener",
] }
dispatch2 = "0.3"
block2 = "0.6"
